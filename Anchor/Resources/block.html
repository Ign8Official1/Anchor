<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocked — Anchor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    #video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    .shade {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(180deg, rgba(2,6,11,0.2) 0%, rgba(2,6,11,0.75) 45%, rgba(2,6,11,0.92) 100%);
    }
    .content {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 32px;
    }
    .eyebrow {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); margin-bottom: 12px;
    }
    .domain {
      font-size: clamp(22px, 4vw, 32px); font-weight: 600;
      margin-bottom: 20px;
    }
    .quote {
      font-size: clamp(18px, 3vw, 24px); line-height: 1.45;
      max-width: 640px; margin-bottom: 14px;
    }
    .attr {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); margin-bottom: 28px;
    }
    .subtitle {
      font-size: 14px; color: rgba(255,255,255,0.45);
    }
    .hint {
      position: fixed; bottom: 28px; left: 0; right: 0; z-index: 2;
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted loop playsinline></video>
  <div class="shade"></div>
  <div class="content">
    <div class="eyebrow">Blocked site</div>
    <div class="domain" id="domain">—</div>
    <div class="quote" id="quote">Return to what matters.</div>
    <div class="attr" id="attr">— Anchor</div>
    <div class="subtitle">Focus session active</div>
  </div>
  <div class="hint">Close this tab or navigate away to continue</div>
  <script>
    const params = new URLSearchParams(location.search);
    document.getElementById('domain').textContent = params.get('domain') || 'Blocked site';
    document.getElementById('quote').textContent = '"' + (params.get('quote') || 'Where focus goes, energy flows.') + '"';
    document.getElementById('attr').textContent = '— ' + (params.get('attr') || 'Tony Robbins').toUpperCase();
    const video = document.getElementById('video');
    video.src = '/Lockedvid.mp4';
    video.play().catch(() => {});
  </script>
</body>
</html>
