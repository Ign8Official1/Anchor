name: Release app

on:
  push:
    branches: [main]
    paths:
      - "Anchor/**"
      - "vendor/aurelia/**"
      - "build.sh"
      - "scripts/**"
      - ".github/workflows/release.yml"
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vendor/aurelia/package-lock.json

      - name: Build Anchor.app
        run: ./build.sh

      - name: Package zip and dmg
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/Anchor.app Anchor-macOS.zip
          STAGING="dist/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R dist/Anchor.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Anchor" -srcfolder "$STAGING" -ov -format UDZO Anchor.dmg

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' Anchor/Info.plist)
          TAG="v${VERSION}"
          NOTES="**Download Anchor.dmg** — open it, drag Anchor to Applications, done.

          Or one command in Terminal:
          \`\`\`bash
          /bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/Ign8Official1/Anchor/main/scripts/install.sh)\"
          \`\`\`

          Requires macOS 13+ on Apple Silicon. Free, no App Store.

          First launch: if macOS blocks the app, right-click Anchor → Open."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" Anchor.dmg Anchor-macOS.zip --clobber
          else
            gh release create "$TAG" Anchor.dmg Anchor-macOS.zip \
              --title "Anchor ${VERSION}" \
              --notes "$NOTES"
          fi
