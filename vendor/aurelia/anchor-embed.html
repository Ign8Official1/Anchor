<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
  <title>Anchor Ocean</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #container canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    body > div:not(#container) {
      display: none !important;
    }
    #veil {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 1;
      pointer-events: none;
      transition: opacity 0.35s ease-out;
    }
    #error {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #8ec8e8;
      font: 13px -apple-system, system-ui, sans-serif;
      text-align: center;
      visibility: hidden;
      max-width: 80%;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="veil"></div>
    <div id="error"></div>
  </div>
  <script src="./anchor-embed.js" type="module"></script>
</body>
</html>
