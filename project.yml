name: Anchor
options:
  bundleIdPrefix: com.anchor
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  Anchor:
    type: application
    platform: macOS
    sources:
      - path: Anchor
        excludes:
          - Info.plist
    info:
      path: Anchor/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Anchor
        CFBundleDisplayName: Anchor
        CFBundleIdentifier: com.anchor.app
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Anchor"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anchor.app
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
